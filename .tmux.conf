# Terminal
set -g default-terminal "tmux-256color"

set -g extended-keys on
set -ag terminal-overrides ",xterm-ghostty:extkeys"
set -ag terminal-overrides ",*256col*:Tc"
set -ag terminal-overrides ",tmux-256color:Tc"

set -g focus-events on
set -g allow-passthrough on

# Prefix
set-option -g prefix C-j
set-option -g prefix2 C-f
unbind-key C-j
bind-key C-j send-prefix

# General
set -g base-index 1
set -g history-limit 100000
set -sg escape-time 0
set -g mouse on
set -g status-keys vi

# Pane navigation (Alt+Arrow)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Splits
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Window navigation
bind -n S-Left  previous-window
bind -n S-Right next-window
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# Clear history
bind-key L clear-history

# Copy mode (vi) - pipes to Mac clipboard
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind P run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Status bar
set -g status on
set -g status-left " #h#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/.*/  (&)/') "
set -g status-left-length 80
set -g status-right ""
set -g status-justify left
set -g automatic-rename off

# Pane titles
set -g pane-border-status top
set -g pane-border-format " #{b:pane_current_path}:#{pane_current_command} "
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
